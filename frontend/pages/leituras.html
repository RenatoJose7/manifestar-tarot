<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Leituras | Manifestar Tarot</title>
  <link rel="stylesheet" href="../css/global.css">
  <link rel="stylesheet" href="../css/header.css">
  <link rel="stylesheet" href="../css/footer.css">
  <link rel="stylesheet" href="../css/leituras.css">
</head>
<body>
  <div id="header"></div>

  <main class="pagina-leituras">
    <section class="leituras-hero">
      <p class="section-kicker">Métodos</p>
      <h1>Leituras de Tarot</h1>
      <p>
        Escolha o método que conversa com o seu momento. Cada leitura tem uma
        proposta própria e pode ser agendada em áudio ou videochamada.
      </p>
    </section>

    <section class="leituras-lista" aria-label="Lista de leituras">
      <div id="lista-leituras" class="leituras-grid"></div>
      <p id="leituras-status" class="estado-pagina">Carregando leituras...</p>
    </section>
  </main>

  <div id="footer"></div>

  <script src="../js/api.js"></script>
  <script src="../js/components.js"></script>
  <script src="../js/leituras.js"></script>
</body>
</html>
