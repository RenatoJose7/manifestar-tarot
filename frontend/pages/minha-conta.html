<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Minha Conta | Manifestar Tarot</title>
  <link rel="stylesheet" href="../css/global.css">
  <link rel="stylesheet" href="../css/header.css">
  <link rel="stylesheet" href="../css/footer.css">
  <link rel="stylesheet" href="../css/auth.css">
  <link rel="apple-touch-icon" sizes="180x180" href="../assets/favicon_io/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="../assets/favicon_io/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="../assets/favicon_io/favicon-16x16.png">
  <link rel="shortcut icon" href="../assets/favicon_io/favicon.ico">
  <link rel="manifest" href="../assets/favicon_io/site.webmanifest"></head>
<body>
  <div id="header"></div>

  <main class="pagina-auth">
    <section class="auth-container">
      <div class="auth-intro">
        <p class="section-kicker">Minha conta</p>
        <h1>Seu cadastro</h1>
        <p>
          Acompanhe seus dados principais e mantenha seu WhatsApp atualizado
          para receber comunicados sobre pedidos, agendamentos e novidades.
        </p>
      </div>

      <div class="auth-card">
        <h2>Dados cadastrados</h2>
        <div id="conta-conteudo">
          <p class="auth-mensagem">Carregando cadastro...</p>
        </div>
        <p id="conta-mensagem" class="auth-mensagem"></p>
        <button class="auth-btn" id="sair-conta" type="button">Sair</button>
      </div>
    </section>
  </main>

  <div id="footer"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/components.js"></script>
  <script src="../js/supabase-config.js"></script>
  <script src="../js/auth-client.js"></script>
  <script src="../js/minha-conta.js"></script>
</body>
</html>
