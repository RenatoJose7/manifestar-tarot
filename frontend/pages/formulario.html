<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Formulário | Manifestar Tarot</title>
  <link rel="stylesheet" href="../css/global.css">
  <link rel="stylesheet" href="../css/header.css">
  <link rel="stylesheet" href="../css/footer.css">
  <link rel="stylesheet" href="../css/formulario.css">
  <link rel="apple-touch-icon" sizes="180x180" href="../assets/favicon_io/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="../assets/favicon_io/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="../assets/favicon_io/favicon-16x16.png">
  <link rel="shortcut icon" href="../assets/favicon_io/favicon.ico">
  <link rel="manifest" href="../assets/favicon_io/site.webmanifest"></head>
<body>
  <div id="header"></div>

  <main class="pagina-formulario">
    <section class="formulario-cabecalho">
      <p class="section-kicker">Agendamento</p>
      <h1 id="formulario-titulo">Formulário</h1>
      <p id="formulario-descricao">
        Preencha os dados da leitura e escolha como deseja receber sua sessão.
      </p>
    </section>

    <form id="formulario-leitura" class="formulario-leitura" novalidate>
      <section class="bloco-formulario">
        <h2>Dados da leitura</h2>
        <div id="campos-dinamicos" class="campos-grid"></div>
      </section>

      <section class="bloco-formulario">
        <h2>Tipo de sessão</h2>
        <div id="formatos-sessao" class="formatos-sessao"></div>
        <p id="formato-ajuda" class="texto-ajuda"></p>
      </section>

      <section class="bloco-formulario">
        <h2>Selecione o dia</h2>
        <div id="agenda-sessoes" class="agenda-sessoes"></div>
      </section>

      <p id="formulario-erro" class="mensagem-erro" role="alert"></p>
      <button class="botao-principal" type="submit">Continuar</button>
    </form>
  </main>

  <div id="footer"></div>

  <script src="../js/api.js"></script>
  <script src="../js/components.js"></script>
  <script src="../js/formulario.js"></script>
</body>
</html>
