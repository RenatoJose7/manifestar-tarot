<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Resumo do Pedido | Manifestar Tarot</title>
  <link rel="stylesheet" href="../css/global.css">
  <link rel="stylesheet" href="../css/header.css">
  <link rel="stylesheet" href="../css/footer.css">
  <link rel="stylesheet" href="../css/checkout.css">
  <link rel="apple-touch-icon" sizes="180x180" href="../assets/favicon_io/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="../assets/favicon_io/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="../assets/favicon_io/favicon-16x16.png">
  <link rel="shortcut icon" href="../assets/favicon_io/favicon.ico">
  <link rel="manifest" href="../assets/favicon_io/site.webmanifest"></head>
<body>
  <div id="header"></div>

  <main class="pagina-checkout">
    <section class="checkout-cabecalho">
      <p class="section-kicker">Resumo e Pagamento</p>
      <h1>Resumo do Pedido</h1>
      <p>Confira sua pré-reserva antes de seguir para o pagamento.</p>
    </section>

    <section class="checkout-grid">
      <div id="resumo-pedido" class="checkout-card"></div>

      <aside class="checkout-card checkout-total">
        <h2>Cupom</h2>
        <div class="cupom-linha">
          <input id="cupom-codigo" type="text" placeholder="Código do cupom">
          <button id="aplicar-cupom" type="button">Aplicar</button>
        </div>
        <p id="cupom-mensagem" class="texto-ajuda"></p>

        <div class="linha-total">
          <span>Subtotal</span>
          <strong id="subtotal-pedido">R$ 0,00</strong>
        </div>
        <div class="linha-total">
          <span>Desconto</span>
          <strong id="desconto-pedido">R$ 0,00</strong>
        </div>
        <div class="linha-total total-final">
          <span>Total</span>
          <strong id="total-pedido">R$ 0,00</strong>
        </div>

        <div class="pagamento-placeholder">
          <h2>Formas de pagamento</h2>
          <p>Pagamento será integrado com Mercado Pago depois.</p>
        </div>

        <button id="finalizar-pagamento" class="botao-principal" type="button">
          Finalizar pagamento
        </button>
        <p id="pagamento-mensagem" class="texto-ajuda"></p>
      </aside>
    </section>
  </main>

  <div id="footer"></div>

  <script src="../js/api.js"></script>
  <script src="../js/components.js"></script>
  <script src="../js/checkout.js"></script>
</body>
</html>
