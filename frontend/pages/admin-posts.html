<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Criar publicações | Manifestar Tarot</title>
  <link rel="stylesheet" href="../css/global.css">
  <link rel="stylesheet" href="../css/header.css">
  <link rel="stylesheet" href="../css/footer.css">
  <link rel="stylesheet" href="../css/auth.css">
  <link rel="stylesheet" href="../css/blog.css">
  <link rel="apple-touch-icon" sizes="180x180" href="../assets/favicon_io/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="../assets/favicon_io/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="../assets/favicon_io/favicon-16x16.png">
  <link rel="shortcut icon" href="../assets/favicon_io/favicon.ico">
  <link rel="manifest" href="../assets/favicon_io/site.webmanifest"></head>
<body>
  <div id="header"></div>

  <main class="pagina-auth">
    <section class="auth-container blog-container admin-posts-container">
      <div class="auth-intro blog-intro">
        <p class="section-kicker">Blog</p>
        <h1>Criar publicações</h1>
        <p>
          Cadastre novas publicações da Egrégora e visualize como a capa será
          recortada antes de publicar.
        </p>
      </div>

      <div class="auth-card admin-posts-card">
        <h2>Novo post</h2>
        <div id="admin-posts-conteudo">
          <p class="auth-mensagem">Verificando acesso...</p>
        </div>
      </div>
    </section>
  </main>

  <div id="footer"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/components.js"></script>
  <script src="../js/supabase-config.js"></script>
  <script src="../js/auth-client.js"></script>
  <script src="../js/admin-posts.js"></script>
</body>
</html>
